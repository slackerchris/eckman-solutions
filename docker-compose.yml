services:
  app:
    image: ${ECKMAN_IMAGE:-ghcr.io/slackerchris/eckman-solutions:latest}
    pull_policy: always
    container_name: eckman-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3000"
      BOOTSTRAP_ADMIN: ${BOOTSTRAP_ADMIN:-false}
      PORTAL_ADMIN_EMAIL: ${PORTAL_ADMIN_EMAIL:-}
      PORTAL_ADMIN_PASSWORD: ${PORTAL_ADMIN_PASSWORD:-}
      PORTAL_ADMIN_NAME: ${PORTAL_ADMIN_NAME:-Portal Admin}
    ports:
      - "3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - eckman-data:/app/data

volumes:
  eckman-data: