services:
  app:
    image: ${ECKMAN_IMAGE:-ghcr.io/slackerchris/eckman-solutions:1.3.18}
    pull_policy: always
    container_name: eckman-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3000"
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/portal.db}
      SESSION_SECRET: ${SESSION_SECRET:-replace-this-with-openssl-rand-base64-32}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-}
      NEXT_PUBLIC_CLIENT_PAYMENT_URL: ${NEXT_PUBLIC_CLIENT_PAYMENT_URL:-}
      VERCEL_URL: ${VERCEL_URL:-}
      BOOTSTRAP_ADMIN: ${BOOTSTRAP_ADMIN:-false}
      PORTAL_ADMIN_EMAIL: ${PORTAL_ADMIN_EMAIL:-}
      PORTAL_ADMIN_PASSWORD: ${PORTAL_ADMIN_PASSWORD:-}
      PORTAL_ADMIN_NAME: ${PORTAL_ADMIN_NAME:-Portal Admin}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}
      CONTACT_TO: ${CONTACT_TO:-chris@eckman.solutions}
    ports:
      - "3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - eckman-data:/app/data

volumes:
  eckman-data: